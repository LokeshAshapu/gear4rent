<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Gear4Rent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#2563eb', secondary: '#1e293b' } }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-slate-800">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <span class="font-bold text-xl text-secondary">Gear4Rent <span
                    class="text-xs bg-gray-200 px-2 py-0.5 rounded text-gray-600">VENDOR</span></span>
            <button id="logout-btn" class="text-red-600 text-sm font-medium">Log Out</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Manage Inventory</h1>

        <!-- Add Laptop Form -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-lg font-bold mb-4">Add New Laptop</h2>
            <form id="add-laptop-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
                        <select id="brand" class="w-full px-3 py-2 border rounded-lg bg-white">
                            <option>Apple</option>
                            <option>Dell</option>
                            <option>HP</option>
                            <option>Lenovo</option>
                            <option>ASUS</option>
                            <option>Acer</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Model Name</label>
                        <input type="text" id="model" required class="w-full px-3 py-2 border rounded-lg"
                            placeholder="e.g. MacBook Air M1">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Processor</label>
                        <input type="text" id="processor" required class="w-full px-3 py-2 border rounded-lg"
                            placeholder="e.g. M1 / i7">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">RAM</label>
                        <input type="text" id="ram" required class="w-full px-3 py-2 border rounded-lg"
                            placeholder="e.g. 16GB">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Storage</label>
                        <input type="text" id="storage" required class="w-full px-3 py-2 border rounded-lg"
                            placeholder="e.g. 512GB SSD">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price Per Day (₹)</label>
                        <input type="number" id="price" required class="w-full px-3 py-2 border rounded-lg"
                            placeholder="e.g. 499">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="category" class="w-full px-3 py-2 border rounded-lg bg-white">
                            <option>Ultrabook</option>
                            <option>Gaming/High Performance</option>
                            <option>Business</option>
                            <option>Budget Friendly</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                    <input type="url" id="image" required class="w-full px-3 py-2 border rounded-lg"
                        placeholder="https://example.com/image.jpg">
                    <p class="text-xs text-gray-400 mt-1">For now, please provide a direct image link.</p>
                </div>

                <button type="submit" id="submit-btn"
                    class="bg-primary hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition w-full md:w-auto">
                    List Laptop
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { addLaptop } from './src/js/db.js';
        import { monitorAuthState, logoutUser } from './src/js/auth.js';

        let currentUser = null;

        monitorAuthState((user, role) => {
            if (!user || role !== 'vendor') {
                // Redirect if not vendor (simple check)
                if (user && role === 'admin') return; // Admin can see
                // window.location.href = 'index.html'; 
            }
            currentUser = user;
        });

        document.getElementById('logout-btn').addEventListener('click', () => logoutUser());

        document.getElementById('add-laptop-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');

            const laptopData = {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                specs: {
                    processor: document.getElementById('processor').value,
                    ram: document.getElementById('ram').value,
                    storage: document.getElementById('storage').value,
                },
                price_per_day: parseInt(document.getElementById('price').value),
                category: document.getElementById('category').value,
                image: document.getElementById('image').value,
                vendorId: currentUser ? currentUser.uid : 'test_vendor'
            };

            btn.disabled = true;
            btn.innerHTML = 'Listing...';

            const result = await addLaptop(laptopData);

            if (result.success) {
                alert("Laptop added successfully!");
                document.getElementById('add-laptop-form').reset();
            } else {
                alert("Error: " + result.error);
            }
            btn.disabled = false;
            btn.innerHTML = 'List Laptop';
        });
    </script>
</body>

</html>

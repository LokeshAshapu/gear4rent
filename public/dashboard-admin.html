<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gear4Rent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#2563eb', secondary: '#1e293b' } }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-slate-800">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <span class="font-bold text-xl text-secondary">Gear4Rent <span
                    class="text-xs bg-red-100 text-red-800 px-2 py-0.5 rounded ml-2">ADMIN</span></span>
            <button id="logout-btn" class="text-red-600 text-sm font-medium">Log Out</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Rental Requests</h1>
            <button onclick="loadOrders()" class="text-primary text-sm hover:underline"><i
                    class="fa-solid fa-rotate"></i> Refresh</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-700 uppercase font-medium">
                        <tr>
                            <th class="px-6 py-4">Order ID</th>
                            <th class="px-6 py-4">Student</th>
                            <th class="px-6 py-4">Laptop</th>
                            <th class="px-6 py-4">Duration</th>
                            <th class="px-6 py-4">Total</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading orders...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { getAllOrders, updateOrderStatus } from './src/js/db.js';
        import { monitorAuthState, logoutUser } from './src/js/auth.js';

        let currentUser = null;

        monitorAuthState((user, role) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            if (role !== 'admin') {
                window.location.replace('index.html');
                return;
            }
            currentUser = user;
            loadOrders();
        });

        document.getElementById('logout-btn').addEventListener('click', () => logoutUser());
        window.loadOrders = loadOrders;

        async function loadOrders() {
            const tbody = document.getElementById('orders-table-body');
            tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...</td></tr>`;

            const orders = await getAllOrders();

            tbody.innerHTML = '';
            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">No rental requests found.</td></tr>`;
                return;
            }


            orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            orders.forEach(order => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";

                let statusColor = 'bg-yellow-100 text-yellow-800';
                if (order.status === 'approved') statusColor = 'bg-green-100 text-green-800';
                if (order.status === 'rejected') statusColor = 'bg-red-100 text-red-800';

                tr.innerHTML = `
                    <td class="px-6 py-4 font-mono text-xs text-gray-500">#${order.id.slice(0, 8)}</td>
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-900">${order.studentName || 'Unknown'}</div>
                        <div class="text-xs text-gray-500">${order.studentEmail}</div>
                    </td>
                    <td class="px-6 py-4">
                         <div class="font-medium text-gray-900">${order.laptopModel}</div>
                    </td>
                    <td class="px-6 py-4">${order.duration} Days<br><span class="text-xs text-gray-500">From: ${order.startDate}</span></td>
                    <td class="px-6 py-4 font-bold text-gray-700">₹${order.totalPrice}</td>
                    <td class="px-6 py-4">
                        <span class="${statusColor} px-2 py-1 rounded-full text-xs font-bold uppercase" id="status-${order.id}">${order.status}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${order.status === 'pending' ? `
                            <div class="flex justify-center gap-2">
                                <button onclick="handleStatus('${order.id}', 'approved')" class="bg-green-50 text-green-600 hover:bg-green-100 p-2 rounded-lg transition" title="Approve">
                                    <i class="fa-solid fa-check"></i>
                                </button>
                                <button onclick="handleStatus('${order.id}', 'rejected')" class="bg-red-50 text-red-600 hover:bg-red-100 p-2 rounded-lg transition" title="Reject">
                                    <i class="fa-solid fa-times"></i>
                                </button>
                            </div>
                        ` : '<span class="text-gray-400 text-xs text-center block">-</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.handleStatus = async (orderId, newStatus) => {
            if (!confirm(`Are you sure you want to ${newStatus} this order?`)) return;

            document.getElementById(`status-${orderId}`).textContent = newStatus;
            document.getElementById(`status-${orderId}`).className = newStatus === 'approved'
                ? 'bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-bold uppercase'
                : 'bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-bold uppercase';

            await updateOrderStatus(orderId, newStatus);
            setTimeout(loadOrders, 500);
        };
    </script>
</body>

</html>

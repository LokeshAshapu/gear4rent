<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gear4Rent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-bold text-secondary mb-2">
                <i class="fa-solid fa-laptop-code text-primary"></i> Gear4Rent
            </a>
            <h2 class="text-gray-600 text-sm">Welcome back! Please login to continue.</h2>
        </div>

        <form id="login-form" class="space-y-6">
            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email" required
                        class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                        placeholder="you@student.edu">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required
                        class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-msg" class="hidden text-red-500 text-sm text-center bg-red-50 p-2 rounded"></div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn"
                class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Don't have an account? <a href="signup.html" class="text-primary font-bold hover:underline">Sign up</a>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { loginUser } from './src/js/auth.js';

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing In...';
            loginBtn.disabled = true;
            errorMsg.classList.add('hidden');

            const result = await loginUser(email, password);

            if (result.success) {
                // Redirect based on role
                if (result.role === 'admin') {
                    window.location.href = 'dashboard-admin.html';
                } else if (result.role === 'vendor') {
                    window.location.href = 'dashboard-vendor.html';
                } else {
                    window.location.href = 'index.html'; // Student
                }
            } else {
                // Friendly error messages — don't leak Firebase internals
                const friendlyErrors = {
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/wrong-password': 'Incorrect password. Please try again.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
                    'auth/invalid-credential': 'Invalid email or password.',
                    'auth/network-request-failed': 'Network error. Check your connection.',
                };
                const code = result.error.match(/\(([^)]+)\)/)?.[1];
                // If there's a known Firebase code, map it; otherwise show the message directly
                errorMsg.textContent = code
                    ? (friendlyErrors[code] || 'Sign in failed. Please check your details.')
                    : result.error;
                errorMsg.classList.remove('hidden');
                loginBtn.innerHTML = `<span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>`;
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
